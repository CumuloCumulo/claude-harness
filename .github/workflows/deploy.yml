name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout claude-code source
        uses: actions/checkout@v4
        with:
          repository: ChinaSiro/claude-code-sourcemap
          path: packages/claude-code-source/src

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate content
        run: pnpm generate

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Copy build output
        run: |
          mkdir -p pages
          cp -r packages/web/out/* pages/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
